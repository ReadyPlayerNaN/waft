[package]
name = "waft-plugin-darkman"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[[bin]]
name = "waft-darkman-daemon"
path = "bin/waft-darkman-daemon.rs"

[dependencies]
waft-plugin-api = { path = "../../crates/plugin-api" }
waft-core = { path = "../../crates/core" }
gtk = { version = "0.10", package = "gtk4", features = ["v4_6", "unsafe-assume-initialized"] }
glib = "0.21"
async-trait = "0.1"
anyhow = "1"
flume = "0.12"
log = "0.4"
tokio = { version = "1", features = ["sync", "rt", "macros"] }

# Daemon-specific dependencies
waft-plugin-sdk = { path = "../../crates/plugin-sdk" }
waft-ipc = { path = "../../crates/ipc" }
zbus = "5"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dirs = "6"
env_logger = "0.11"

[dev-dependencies]
waft-overview = { path = "../../crates/overview" }
libc = "0.2"
