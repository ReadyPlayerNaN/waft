[package]
name = "waft-plugin-sunsetr"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "waft-sunsetr-daemon"
path = "bin/waft-sunsetr-daemon.rs"

[dependencies]
waft-plugin = { path = "../../crates/plugin" }
waft-protocol = { path = "../../crates/protocol" }
anyhow = "1"
log = "0.4"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
