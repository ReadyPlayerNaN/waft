[package]
name = "waft-plugin-sunsetr"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "waft-sunsetr-daemon"
path = "bin/waft-sunsetr-daemon.rs"

[dependencies]
waft-plugin-sdk = { path = "../../crates/plugin-sdk" }
waft-ipc = { path = "../../crates/ipc" }
async-trait = "0.1"
anyhow = "1"
log = "0.4"
env_logger = "0.11"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
