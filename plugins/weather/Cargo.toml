[package]
name = "waft-plugin-weather"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[[bin]]
name = "waft-weather-daemon"
path = "bin/waft-weather-daemon.rs"

[dependencies]
waft-plugin = { path = "../../crates/plugin" }
waft-protocol = { path = "../../crates/protocol" }
waft-i18n = { path = "../../crates/i18n" }
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
dirs = "5.0"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
reqwest = { version = "0.12", features = ["json"] }
toml = "0.8"
log = "0.4"

[lints]
workspace = true
