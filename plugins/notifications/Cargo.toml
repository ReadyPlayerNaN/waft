[package]
name = "waft-plugin-notifications"
version = "0.1.0"
edition = "2024"

[lib]
name = "waft_plugin_notifications"
path = "src/lib.rs"

[[bin]]
name = "waft-notifications-daemon"
path = "bin/waft-notifications.rs"

[dependencies]
waft-config = { path = "../../crates/config" }
waft-plugin = { path = "../../crates/plugin" }
waft-protocol = { path = "../../crates/protocol" }
async-trait = "0.1"
anyhow = "1"
dirs = "5"
flume = "0.12"
log = "0.4"
env_logger = "0.11"
indexmap = "2"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros", "process"] }
toml = "0.8"
zbus = { version = "5", default-features = false, features = ["tokio"] }
zvariant = "5"
