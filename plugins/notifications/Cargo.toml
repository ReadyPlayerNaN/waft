[package]
name = "waft-plugin-notifications"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
waft-plugin-api = { path = "../../crates/plugin-api" }
waft-core = { path = "../../crates/core" }
gtk = { version = "0.10", package = "gtk4", features = ["v4_6", "unsafe-assume-initialized"] }
glib = "0.21"
libadwaita = { version = "0.8", package = "libadwaita" }
gtk4-layer-shell = "0.7.1"
async-trait = "0.1"
anyhow = "1"
flume = "0.12"
log = "0.4"
indexmap = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }
zbus = { version = "5", default-features = false, features = ["tokio"] }
zvariant = "5"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
uuid = { version = "1", features = ["v4"] }
