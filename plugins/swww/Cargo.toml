[package]
name = "waft-plugin-swww"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "waft-swww-daemon"
path = "bin/waft-swww-daemon.rs"

[dependencies]
waft-plugin = { path = "../../crates/plugin" }
waft-i18n = { path = "../../crates/i18n" }
waft-protocol = { path = "../../crates/protocol" }
async-trait = "0.1"
anyhow = "1"
chrono = "0.4"
dirs = "5"
fastrand = "2"
futures-util = "0.3"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
zbus = { version = "5", default-features = false, features = ["tokio"] }

[lints]
workspace = true
