name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libcairo2-dev libgdk-pixbuf2.0-dev libpango1.0-dev libgtk-4-dev libadwaita-1-dev libatk1.0-dev meson ninja-build gobject-introspection libgirepository1.0-dev valac libwayland-dev wayland-protocols
      - name: Build gtk4-layer-shell
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build
          meson compile -C build
          sudo meson install -C build
      - run: cargo test
