[package]
name = "sacrebleui"
version = "0.1.0"
edition = "2021"

[dependencies]
adw = { version = "0.8.1", package = "libadwaita", features = ["v1_5"] }
anyhow = "1"
async-channel = "2"
async-trait = "0.1"
env_logger = "0.11"
flume = "0.12"
futures-util = "0.3"
gio = "0.20"
gtk = { version = "0.10", package = "gtk4", features = ["v4_6"] }
glib = "0.21"
gtk4-layer-shell = "0.7.1"
log = "0.4"
once_cell = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "io-util", "time", "process"] }
tokio-stream = "0.1.18"
toml = "0.8"
dirs = "5"
zbus = "5"
zvariant = "5"
indexmap = "2.13.0"
reqwest = { version = "0.12", features = ["json"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
