[package]
name = "sacrebleui"
version = "0.1.0"
edition = "2024"

[dependencies]
adw = { version = "0.8.1", package = "libadwaita", features = ["v1_5"] }
anyhow = "1"
async-trait = "0.1"
env_logger = "0.11"
flume = "0.12"
futures-util = "0.3"
gio = "0.20"
gtk = { version = "0.10", package = "gtk4", features = ["v4_6"] }
glib = "0.21"
gtk4-layer-shell = "0.7.1"
log = "0.4"
relm4 = { version = "0.10.1", features = ["libadwaita"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "io-util", "time", "process"] }
tokio-stream = "0.1.18"
zbus = "5"
zvariant = "5"
